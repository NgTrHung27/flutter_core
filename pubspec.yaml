name: flutter_core
description: "Core Flutter"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

#---------PACKAGES----------#
dependencies:
  flutter:
    sdk: flutter
  # UI Packages
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  badges: ^3.1.2

  # Images Support
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_svg: ^2.1.0

  #Navigation
  go_router: ^17.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^11.0.0
  equatable: ^2.0.7
  fpdart: ^1.2.0

  # Internationalization
  easy_localization: ^3.0.7+1
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.3
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^20.1.0
  firebase_analytics: ^12.0.2

  # Local Storage
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0
  flutter_cache_manager: ^3.4.1

  # Connection & HTTP/REST API
  internet_connection_checker: ^3.0.1
  dio: ^5.8.0+1

  # Utility Packages
  logger: ^2.6.2

  # Dependency Injection
  get_it: ^9.0.5

  # Testing
  mocktail: ^1.0.5
  bloc_test: ^10.0.0

  # Secure SSL Pinning
  firebase_remote_config: ^6.4.0


  # Other
  app_settings: ^7.0.0
  path_provider: ^2.1.5
  hive: ^2.2.3
  permission_handler: ^12.0.1
  crypto: ^3.0.7
#---------PACKAGES - END----------#

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  #--------LOCAL ASSETS--------------#
  assets:
    - assets/
    - assets/images/
    - assets/svgs/
    - assets/translations/
    - shorebird.yaml
#--------LOCAL FONTS---------------#
