name: Distribute to Firebase QA

on:
  push:
    branches: ["master", "main"]

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy code về
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # 2. Cài đặt Java (Cần thiết để build Android)
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 3. Cài đặt Flutter
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 4. Cài đặt Shorebird CLI (Dùng official action - đúng cách nhất)
      - name: 🐦 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # 5. Tạo file google-services.json từ Secret
      - name: 📝 Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # 6. Cài đặt Ruby & Chạy Bundle Install cho Fastlane
      - name: 💎 Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      # 7. Build và Distribute APK lên Firebase
      - name: 🚀 Build and Distribute APK
        working-directory: android
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: bundle exec fastlane distribute_to_qa
