name: 🚀 Build & Distribute to Firebase QA

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: 🐦 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📝 Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: ✅ Verify google-services.json
        run: cat android/app/google-services.json | head -5

      - name: 🔢 Auto Increment Version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          echo "Current version: $VERSION"
          IFS='+' read -r VERSION_PART BUILD_PART <<< "$VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_PART"
          if [ -z "$BUILD_PART" ]; then
            NEW_BUILD=1
          else
            NEW_BUILD=$((BUILD_PART + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}+${NEW_BUILD}"
          echo "New version: $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          cd android/app && sed -i "s/versionCode = flutter.versionCode/versionCode = $NEW_BUILD/" build.gradle.kts && cd ../..

      - name: 💎 Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: 🚀 Build and Distribute APK
        working-directory: android
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: bundle exec fastlane distribute_to_qa
